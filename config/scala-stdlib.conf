# Retrofit JEP 401 value classes onto Scala stdlib types we cannot annotate.
#
# Rule the agent enforces (a wrong entry is gated out with a clear reason, not
# promoted into something that fails to load): a value class may only extend
# Object or an abstract, STATELESS value super class -> list the abstract super
# here too. (Identity nested classes of a value class are fixed automatically:
# the agent marks ACC_IDENTITY on their InnerClasses entries, as javac does, so
# e.g. scala.Option$WithFilter needs no special handling.)
#
# Class names: dots or slashes; nested classes use '$' (e.g. Range$Inclusive).

# Either/Left/Right and Option/Some all promote: Either/Option are abstract
# stateless value supers; Left/Right/Some are final one-field leaves.
value-class = \
  scala.util.Either, \
  scala.util.Left, \
  scala.util.Right, \
  scala.Option, \
  scala.Some

# Still not promotable (kept as documentation of WHY):
#   scala.collection.immutable.Range, Range$Inclusive, Range$Exclusive
#     -> Range has instance fields (start/end/step/...) and extends AbstractSeq;
#        a value super class must be abstract and stateless.

# "The author forgot `final` but I know it has no subclasses": either finalize
# specific classes, or flip the blanket mode.
# finalize = com.example.ForgotFinal
# allow-non-final = false
