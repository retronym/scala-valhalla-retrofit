# Retrofit JEP 401 value classes onto Scala stdlib types we cannot annotate.
#
# Rules the agent enforces (a wrong entry is gated out with a clear reason, not
# promoted into something that fails to load):
#   - a value class may only extend Object or an abstract, STATELESS value super
#     class -> list the abstract super here too;
#   - a value class may not enclose a non-static inner member class.
#
# Class names: dots or slashes; nested classes use '$' (e.g. Range$Inclusive).

# Either/Left/Right promote cleanly: Either is an abstract stateless super whose
# only nested classes are static; Left/Right are final one-field leaves.
value-class = \
  scala.util.Either, \
  scala.util.Left, \
  scala.util.Right

# Not promotable on the current build (kept here as documentation of WHY):
#   scala.Option, scala.Some
#     -> scala.Option encloses the non-static inner member class Option$WithFilter
#        (a value class cannot capture an enclosing value instance).
#   scala.collection.immutable.Range, Range$Inclusive, Range$Exclusive
#     -> Range has instance fields (start/end/step/...) and extends AbstractSeq;
#        a value super class must be abstract and stateless.

# "The author forgot `final` but I know it has no subclasses": either finalize
# specific classes, or flip the blanket mode.
# finalize = com.example.ForgotFinal
# allow-non-final = false
